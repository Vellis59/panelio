<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="24" fill="#0B0F14"/>
  
  <!-- Grille asymétrique 4 blocs - effet dashboard -->
  
  <!-- Bloc 1 - Grand bloc haut gauche -->
  <rect x="32" y="48" width="88" height="56" rx="6" fill="#3B82F6"/>
  
  <!-- Bloc 2 - Bloc fin haut droite -->
  <rect x="136" y="48" width="88" height="28" rx="6" fill="#3B82F6"/>
  
  <!-- Bloc 3 - Petit bloc moyen haut droite (sous le fin) -->
  <rect x="136" y="88" width="56" height="16" rx="4" fill="#3B82F6" opacity="0.5"/>
  
  <!-- Bloc 4 - Moyen bloc milieu gauche -->
  <rect x="32" y="120" width="56" height="88" rx="6" fill="#3B82F6"/>
  
  <!-- Bloc 5 - Grand bloc bas droite -->
  <rect x="104" y="120" width="120" height="88" rx="6" fill="#3B82F6"/>
  
  <!-- Bloc 6 - Bloc fin vertical gauche -->
  <rect x="32" y="120" width="16" height="88" rx="4" fill="#3B82F6" opacity="0.4"/>
  
  <!-- Variation d'épaisseur - effet widgets -->
  <rect x="136" y="48" width="16" height="56" rx="4" fill="#0B0F14" opacity="0.3"/>
  <rect x="104" y="120" width="8" height="88" rx="4" fill="#0B0F14" opacity="0.2"/>
</svg>
